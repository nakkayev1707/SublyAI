<div class="container py-5">
  <h1 class="mb-4">Result</h1>
  @if (videoId) {
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="ratio ratio-16x9 bg-dark rounded mb-3">
          <video
            controls
            [src]="videoSrc"
            crossorigin="anonymous"
          >
            <track
              kind="subtitles"
              [src]="subtitleTrackSrc"
              label="Subtitles"
              default
            />
            Your browser does not support the video tag.
          </video>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <a
            class="btn btn-outline-primary"
            [href]="downloadSubtitleUrl"
            download="subtitles.srt"
            target="_blank"
            rel="noopener"
          >
            Download SRT
          </a>
        </div>
      </div>
    </div>
  } @else {
    <p class="text-muted">No video selected.</p>
  }
</div>
